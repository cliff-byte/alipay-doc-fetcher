name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: skills/fetch-alipay-doc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # 纯函数单测（render / sanity / paths）零运行时依赖，不需要安装 playwright/chromium
      - name: Run unit tests
        run: npm test
